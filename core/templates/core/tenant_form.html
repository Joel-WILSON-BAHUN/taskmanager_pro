{% extends 'core/base.html' %}
{% block title %}{{ action }} une entreprise{% endblock %}
{% block page_title %}{{ action }} une entreprise{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <div data-aos="fade-up" class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="flex items-center gap-3 px-6 py-5 border-b border-slate-100 bg-gradient-to-r from-brand-50 to-white">
            <div class="w-10 h-10 rounded-xl bg-brand-600 flex items-center justify-center">
                <i data-lucide="building-2" class="w-5 h-5 text-white"></i>
            </div>
            <h2 class="font-display font-bold text-slate-800">{{ action }} une entreprise</h2>
        </div>
        <div class="p-6">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                {% for field in form %}
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
                <div class="flex gap-3 pt-4 border-t border-slate-100">
                    <button type="submit" class="flex items-center gap-2 bg-brand-600 hover:bg-brand-700 text-white font-semibold px-6 py-2.5 rounded-xl transition">
                        <i data-lucide="check" class="w-4 h-4"></i>{{ action }}
                    </button>
                    <a href="{% url 'tenant_list' %}" class="border border-slate-200 hover:bg-slate-50 text-slate-600 font-semibold px-5 py-2.5 rounded-xl transition">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
