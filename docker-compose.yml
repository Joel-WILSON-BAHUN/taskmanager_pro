version: '3.9'

services:
  web:
    build: .
    container_name: taskmanager_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - db_volume:/app
    environment:
      - DJANGO_SETTINGS_MODULE=taskmanager.settings
      - DEBUG=False
    networks:
      - taskmanager_net

  nginx:
    image: nginx:alpine
    container_name: taskmanager_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/staticfiles:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - taskmanager_net

volumes:
  static_volume:
  media_volume:
  db_volume:

networks:
  taskmanager_net:
    driver: bridge
