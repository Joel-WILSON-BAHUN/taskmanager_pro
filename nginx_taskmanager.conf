# ──────────────────────────────────────────────────────────────────
#  Nginx — Virtual Host TaskManager Pro
#  Fichier : /etc/nginx/sites-available/taskmanager
#  Activer : ln -s /etc/nginx/sites-available/taskmanager \
#                   /etc/nginx/sites-enabled/taskmanager
# ──────────────────────────────────────────────────────────────────

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name taskmanager.local 192.168.100.10;

    # ACME challenge Let's Encrypt (ou certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Serveur HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name taskmanager.local 192.168.100.10;

    # ── Certificat (auto-signé en dev, Let's Encrypt en prod) ──────
    ssl_certificate     /etc/ssl/taskmanager/cert.pem;
    ssl_certificate_key /etc/ssl/taskmanager/key.pem;

    # ── Paramètres TLS (recommandations Mozilla Intermediate) ──────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;

    # ── Headers de sécurité ────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Content-Security-Policy   "default-src 'self' https: data:; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:;" always;

    # ── Logs séparés et rotatifs ───────────────────────────────────
    access_log /var/log/nginx/taskmanager_access.log combined;
    error_log  /var/log/nginx/taskmanager_error.log  warn;

    # ── Taille max upload (avatars, pièces jointes) ────────────────
    client_max_body_size 10m;

    # ── Fichiers statiques (Django collectstatic) ──────────────────
    # Nginx sert directement SANS passer par Gunicorn (perf++)
    location /static/ {
        alias   /var/www/taskmanager_pro/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # ── Fichiers media (uploads utilisateurs) ─────────────────────
    location /media/ {
        alias   /var/www/taskmanager_pro/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Proxy vers Gunicorn via socket Unix ────────────────────────
    location / {
        proxy_pass          http://unix:/run/gunicorn/gunicorn.sock;
        proxy_http_version  1.1;

        # Headers transmis à Django
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Keepalive entre Nginx et Gunicorn
        proxy_set_header Connection "";
        keepalive_timeout 75;
    }

    # ── Bloquer accès aux fichiers sensibles ───────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|git|sql|bak)$ {
        deny all;
    }
}
